<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>MoodBloom Analytics</title>
<link rel="stylesheet"
href="./css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="analytics-container">
    <!-- HEADER -->
    <div class="analytics-header">
        <h1>📊 Mood Analytics</h1>
        <a href="dashboard.html"
        class="back-btn">
        ← Dashboard
        </a>
    </div>
    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <h2 id="totalNotes">
                0
            </h2>
            <p>Total Notes</p>
        </div>
        <div class="stat-card">
            <h2>
                7
            </h2>
            <p>Day Streak</p>
        </div>
        <div class="stat-card">
            <h2>
                😊
            </h2>
            <p>Top Mood</p>
        </div>
        <div class="stat-card">
            <h2>
                85%
            </h2>
            <p>Positivity</p>
        </div>
    </div>
    <!-- MOOD CALENDAR -->
    <div class="calendar-section">
        <h2>Mood Calendar</h2>
        <div class="calendar-grid">
            <div>😊</div>
            <div>😊</div>
            <div>😌</div>
            <div>😊</div>
            <div>😢</div>
            <div>😊</div>
            <div>💪</div>
            <div>😊</div>
            <div>😌</div>
            <div>😊</div>
            <div>😊</div>
            <div>😢</div>
            <div>💪</div>
            <div>😊</div>
        </div>
    </div>
    <!-- ACTIVITY -->
    <div class="activity-section">
        <h2>Weekly Progress</h2>
        <div class="bars">
            <div class="bar bar1"></div>
            <div class="bar bar2"></div>
            <div class="bar bar3"></div>
            <div class="bar bar4"></div>
            <div class="bar bar5"></div>
            <div class="bar bar6"></div>
            <div class="bar bar7"></div>
        </div>
    </div>
<footer>
🌸 MoodBloom © 2026
</footer>
</div>
<script src="script.js"></script>
</body>
</html>
