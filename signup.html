<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodBloom Sign Up</title>
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-container">
<div class="login-card">
<div class="logo">
🌸
</div>
<h1>Create Account</h1>
<p class="tagline">
Join MoodBloom Today
</p>
<form id="signupForm">
<div class="input-box">
<i class="fa-solid fa-user"></i>
<input
type="text"
id="signupName"
placeholder="Full Name"
required>
</div>
<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input
type="email"
id="signupEmail"
placeholder="Email"
required>
</div>
<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input
type="password"
id="signupPassword"
placeholder="Password"
required>
</div>
<button
type="submit"
class="login-btn">
Create Account
</button>
</form>
<p class="signup-text">
Already have an account?
<a href="login.html">
Login
</a>
</p>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
